version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - misspell
    - whitespace
    - wsl_v5
  settings:
    revive:
      rules:
        - name: error-return
          disabled: false
        - name: error-strings
          disabled: false
        - name: error-naming
          disabled: false
    errcheck:
      check-type-assertions: true
      check-blank: true

formatters:
  enable:
    - goimports
    - gci
  settings:
    goimports:
      local-prefixes:
        - time-guard-bot
    gci:
      sections:
        - standard
        - default
        - prefix(time-guard-bot)
      custom-order: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
